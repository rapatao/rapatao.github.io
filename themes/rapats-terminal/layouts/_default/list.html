{{ define "main" }}
<div class="post-list">
    {{ range .Paginator.Pages }}
    <div class="post-item">
        <span class="post-date">{{ .Date.Format "Jan 02, 2006" }}</span>
        <span class="post-title"><a href="{{ .Permalink }}">{{ .Title }}</a></span>
        <div class="post-summary">
            {{ .Summary | truncate 200 }}
        </div>
    </div>
    {{ end }}
</div>
{{ partial "pagination.html" . }}
{{ end }}
