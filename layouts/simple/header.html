<header>
    <div class="title">
        {{ if $.Scratch.Get "h1" }}
            <h1>{{ .Title }}</h1>
            {{ $.Scratch.Set "h1" false }}
        {{ else }}
            <h2>{{ .Title }}</h2>
        {{ end }}
        {{ with .Description }}
            <p>{{ . }}</p>
        {{ end }}
    </div>
</header>
