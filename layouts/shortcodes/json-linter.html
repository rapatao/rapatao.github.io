<div class="json-tool">
    <h2 class="tool-title">JSON Formatter & Validator</h2>
    <p>Validate, format, or minify your JSON strings. Use tree-view to expand/collapse.</p>
    
    <form onsubmit="return doOnSubmit(true)" onreset="doOnReset()">
        <label for="json-original">Input JSON:</label>
        <textarea id="json-original" rows="8" autofocus required oninput="autoGrow(this);"></textarea>
        
        <div class="tool-actions">
            <button type="submit">Format</button>
            <button type="button" onclick="doOnSubmit(false)">Minify</button>
            <button type="button" onclick="copyToClipboard()">Copy</button>
            <button type="reset">Clear</button>
        </div>
    </form>
    
    <div class="status-container">
        <span id="json-result-status"></span>
    </div>
    <div id="json-tree" class="tree-view"></div>
</div>

<style>
    .json-tool { margin: 20px 0; }
    .tool-title { color: var(--prompt-color); margin-bottom: 5px; }
    .tool-actions { margin: 10px 0; display: flex; gap: 10px; }
    .status-container { margin-top: 10px; font-weight: bold; }
    .tree-view { margin-top: 15px; background: #1e1e1e; padding: 15px; border: 1px solid var(--dim-text); overflow-x: auto; color: #d1d1d1; font-family: monospace; line-height: 1.4; }
    .tree-node { margin-left: 20px; }
    .toggle { cursor: pointer; color: var(--prompt-color); margin-right: 5px; user-select: none; font-weight: bold; }
    .key { color: #569cd6; font-weight: bold; }
    .string { color: #ce9178; }
    .number { color: #b5cea8; }
    .boolean { color: #569cd6; }
</style>

<script>
    const elSourceJson = document.getElementById("json-original");
    const elTargetStatus = document.getElementById("json-result-status");
    const elTree = document.getElementById("json-tree");

    function getNumRows(text) {
        const rows = (text || "").split("\n").length;
        return Math.min(Math.max(rows, 8), 20);
    }

    function copyToClipboard() {
        elSourceJson.select();
        document.execCommand("copy");
        elTargetStatus.innerText = "Copied to clipboard!";
        elTargetStatus.style.color = "var(--prompt-color)";
    }

    function createTree(obj, container) {
        if (obj === null || typeof obj !== 'object') {
            const span = document.createElement('span');
            const type = (obj === null) ? 'null' : typeof obj;
            
            if (typeof obj === 'string') {
                span.className = 'string';
                span.innerText = '"' + obj + '"';
            } else if (typeof obj === 'number') {
                span.className = 'number';
                span.innerText = obj;
            } else if (typeof obj === 'boolean') {
                span.className = 'boolean';
                span.innerText = obj;
            } else {
                span.innerText = String(obj);
            }
            
            const typeSpan = document.createElement('small');
            typeSpan.style.color = '#777';
            typeSpan.innerText = ' (' + type + ')';
            
            container.appendChild(span);
            container.appendChild(typeSpan);
            return;
        }

        const isArray = Array.isArray(obj);
        for (const key in obj) {
            const div = document.createElement('div');
            div.className = 'tree-node';
            
            const toggle = document.createElement('span');
            toggle.className = 'toggle';
            toggle.innerText = '[-]';
            toggle.onclick = function() {
                const child = this.parentNode.querySelector('.children');
                if (child.style.display === 'none') {
                    child.style.display = 'block';
                    this.innerText = '[-]';
                } else {
                    child.style.display = 'none';
                    this.innerText = '[+]';
                }
            };
            
            div.appendChild(toggle);
            
            const keySpan = document.createElement('span');
            keySpan.className = 'key';
            keySpan.innerText = key;
            div.appendChild(keySpan);
            
            // Only add type hint if it's an object or array
            if (obj[key] !== null && typeof obj[key] === 'object') {
                const typeHint = Array.isArray(obj[key]) ? ' (array)' : ' (object)';
                const typeSpan = document.createElement('small');
                typeSpan.style.color = '#777';
                typeSpan.innerText = typeHint;
                div.appendChild(typeSpan);
            }
            
            div.appendChild(document.createTextNode(': '));
            
            const children = document.createElement('div');
            children.className = 'children';
            createTree(obj[key], children);
            
            div.appendChild(children);
            container.appendChild(div);
        }
    }

    document.addEventListener("parseJson", function (e) {
        const content = (e.detail || {}).content || "";
        const format = (e.detail || {}).format !== undefined ? e.detail.format : true;

        try {
            const jsonAsObj = JSON.parse(content);
            if (format) {
                elTree.innerHTML = '';
                createTree(jsonAsObj, elTree);
                elTree.style.display = 'block';
            } else {
                elTree.style.display = 'none';
            }
            elSourceJson.value = JSON.stringify(jsonAsObj, undefined, format ? 4 : 0);
            elTargetStatus.innerText = "✓ Valid JSON";
            elTargetStatus.style.color = "var(--prompt-color)";
        } catch (e) {
            elTargetStatus.innerText = "✗ Invalid JSON: " + e.message;
            elTargetStatus.style.color = "#ff6b6b";
            elTree.style.display = 'none';
        }
        elSourceJson.rows = getNumRows(elSourceJson.value);
    });

    function doOnSubmit(formatJson) {
        document.dispatchEvent(new CustomEvent("parseJson", {
            detail: { content: elSourceJson.value, format: formatJson }
        }));
        return false;
    }

    function doOnReset() {
        elTargetStatus.innerText = "";
        elSourceJson.rows = 8;
        elTree.innerHTML = '';
        elTree.style.display = 'none';
    }

    function autoGrow(textArea) {
        textArea.rows = getNumRows(textArea.value);
    }
</script>
