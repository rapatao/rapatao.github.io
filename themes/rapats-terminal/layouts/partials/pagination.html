{{ $pag := $.Paginator }}
{{ if gt $pag.TotalPages 1 }}
<div class="pagination">
    <nav>
        <ul>
            {{ if $pag.HasPrev }}
            <li class="prev"><a href="{{ $pag.Prev.URL }}">&lt; (P)REVIOUS</a></li>
            {{ end }}
            <li>PAGE {{ $pag.PageNumber }} / {{ $pag.TotalPages }}</li>
            {{ if $pag.HasNext }}
            <li class="next"><a href="{{ $pag.Next.URL }}">(N)EXT &gt;</a></li>
            {{ end }}
        </ul>
    </nav>
</div>
{{ end }}
