{{ $file := .Get "file" }}
<div class="pdf-container" style="margin-top: 20px;">
    <iframe src="{{ $file }}" width="100%" height="800px" style="border: 1px solid var(--dim-text);">
        This browser does not support PDFs. Please download the PDF to view it: <a href="{{ $file }}">Download PDF</a>.
    </iframe>
</div>
